# GlaciaNav one-pager: static site behind a Cloudflare Tunnel.
#
# On the Hetzner server:
#   1. cp .env.example .env  and fill in the values
#   2. docker compose pull
#   3. docker compose up -d
#
# Traffic flow:  internet -> Cloudflare -> cloudflared (this host) -> web:80
# The web container is NOT published to the host; only the tunnel can reach it.
#
# Auto-deploy: the `watchtower` service polls GHCR and, when the GitHub Actions
# build publishes a new `web` image, pulls it and restarts the container.
# It only watches containers labelled watchtower.enable=true (i.e. `web`),
# so it never touches the tunnel.

services:
  web:
    # Image is built and pushed to GHCR by .github/workflows/deploy.yml
    image: ${WEB_IMAGE:-ghcr.io/your-org/glacianav-web:latest}
    restart: unless-stopped
    expose:
      - "80"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - glacianav

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - web
    networks:
      - glacianav

  watchtower:
    # Maintained fork: the original containrrr/watchtower is unmaintained and
    # speaks Docker API v1.25, which modern daemons reject (need >= 1.40).
    image: nickfedor/watchtower:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # If the GHCR package is PRIVATE, mount a docker config with a
      # read:packages token so watchtower can pull. Public package = not needed.
      # - ~/.docker/config.json:/config.json:ro
    command: --interval 60 --cleanup --label-enable
    networks:
      - glacianav

networks:
  glacianav:
    driver: bridge
